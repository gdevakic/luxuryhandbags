<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — MAISON LUXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --cream:#F5F0E8; --dark:#1A1410; --gold:#C9A84C; --gold-light:#E8D5A3; --warm-gray:#8A7F74; --accent:#8B2635; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--cream);color:var(--dark);font-family:'Montserrat',sans-serif;overflow-x:hidden;}
    nav{position:fixed;top:0;width:100%;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.2rem 4rem;background:rgba(245,240,232,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,168,76,0.2);}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;letter-spacing:0.3em;color:var(--dark);text-decoration:none;}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dark);text-decoration:none;transition:color 0.2s;}
    .nav-links a:hover{color:var(--gold);}
    .nav-icons{display:flex;gap:1.5rem;align-items:center;}
    .nav-icons a{color:var(--dark);text-decoration:none;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
    .nav-icons a:hover{color:var(--gold);}
    .cart-badge{background:var(--accent);color:white;border-radius:50%;width:18px;height:18px;font-size:0.6rem;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;}

    /* PAGE HEADER */
    .page-header{margin-top:80px;padding:4rem 4rem 2rem;background:var(--dark);color:var(--cream);}
    .breadcrumb{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(245,240,232,0.4);margin-bottom:1rem;}
    .breadcrumb a{color:rgba(245,240,232,0.4);text-decoration:none;transition:color 0.2s;}
    .breadcrumb a:hover{color:var(--gold);}
    .breadcrumb span{margin:0 0.5rem;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:300;line-height:1.2;}
    .page-title em{font-style:italic;color:var(--gold);}

    /* SHOP LAYOUT */
    .shop-layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:80vh;}

    /* SIDEBAR */
    .sidebar{padding:2.5rem;border-right:1px solid rgba(26,20,16,0.1);position:sticky;top:80px;height:calc(100vh - 80px);overflow-y:auto;}
    .filter-section{margin-bottom:2.5rem;}
    .filter-title{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dark);margin-bottom:1.2rem;padding-bottom:0.75rem;border-bottom:1px solid rgba(26,20,16,0.1);}
    .filter-options{display:flex;flex-direction:column;gap:0.6rem;}
    .filter-opt{display:flex;align-items:center;gap:0.75rem;cursor:pointer;}
    .filter-opt input{accent-color:var(--gold);width:14px;height:14px;}
    .filter-opt label{font-size:0.75rem;color:var(--warm-gray);cursor:pointer;transition:color 0.2s;}
    .filter-opt:hover label{color:var(--dark);}
    .price-range{width:100%;accent-color:var(--gold);}
    .price-labels{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--warm-gray);margin-top:0.5rem;}
    .color-swatches{display:flex;flex-wrap:wrap;gap:0.5rem;}
    .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;}
    .swatch:hover,.swatch.active{border-color:var(--dark);}
    .clear-filters{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);cursor:pointer;border:none;background:none;font-family:'Montserrat',sans-serif;margin-top:1rem;text-decoration:underline;}

    /* PRODUCTS AREA */
    .products-area{padding:2.5rem;}
    .shop-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(26,20,16,0.1);}
    .result-count{font-size:0.75rem;color:var(--warm-gray);}
    .sort-select{padding:0.5rem 1rem;border:1px solid rgba(26,20,16,0.2);background:white;font-family:'Montserrat',sans-serif;font-size:0.72rem;color:var(--dark);cursor:pointer;outline:none;}
    .sort-select:focus{border-color:var(--gold);}
    .view-toggle{display:flex;gap:0.5rem;}
    .view-btn{padding:0.4rem 0.6rem;border:1px solid rgba(26,20,16,0.2);background:transparent;cursor:pointer;font-size:0.8rem;color:var(--warm-gray);transition:all 0.2s;}
    .view-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}

    /* PRODUCT GRID */
    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
    .product-grid.list-view{grid-template-columns:1fr;}
    .product-card{cursor:pointer;}
    .product-img{aspect-ratio:3/4;position:relative;overflow:hidden;margin-bottom:1rem;}
    .product-img-fill{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform 0.5s ease;}
    .product-card:hover .product-img-fill{transform:scale(1.05);}
    .product-badge{position:absolute;top:1rem;left:1rem;background:var(--accent);color:white;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.3rem 0.6rem;z-index:2;}
    .product-badge.new{background:var(--dark);}
    .product-actions{position:absolute;bottom:0;left:0;right:0;background:rgba(26,20,16,0.9);padding:1rem;display:flex;gap:0.5rem;transform:translateY(100%);transition:transform 0.3s ease;}
    .product-card:hover .product-actions{transform:translateY(0);}
    .btn-cart{flex:1;padding:0.6rem;background:var(--gold);color:var(--dark);font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;transition:background 0.2s;}
    .btn-cart:hover{background:var(--gold-light);}
    .btn-wish{width:40px;padding:0.6rem;background:transparent;color:var(--cream);border:1px solid rgba(245,240,232,0.3);cursor:pointer;font-size:1rem;transition:all 0.2s;}
    .btn-wish:hover{border-color:var(--accent);color:var(--accent);}
    .product-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:400;margin-bottom:0.25rem;}
    .product-type{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:0.5rem;}
    .product-price{font-size:0.85rem;font-weight:600;color:var(--dark);}
    .product-price .original{text-decoration:line-through;color:var(--warm-gray);margin-left:0.5rem;font-weight:300;}
    .stars{color:var(--gold);font-size:0.7rem;margin-bottom:0.3rem;}

    /* PAGINATION */
    .pagination{display:flex;justify-content:center;align-items:center;gap:0.5rem;padding:3rem 0;}
    .page-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(26,20,16,0.2);background:transparent;font-size:0.75rem;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s;text-decoration:none;color:var(--dark);}
    .page-btn.active,.page-btn:hover{background:var(--dark);color:var(--cream);border-color:var(--dark);}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--dark);color:var(--cream);padding:1rem 1.5rem;font-size:0.75rem;letter-spacing:0.05em;z-index:999;transform:translateX(200%);transition:transform 0.3s;border-left:3px solid var(--gold);}
    .toast.show{transform:translateX(0);}

    footer{background:var(--dark);color:var(--cream);padding:3rem 4rem;}
    .footer-bottom{display:flex;justify-content:space-between;align-items:center;}
    .footer-copy{font-size:0.68rem;color:rgba(245,240,232,0.3);letter-spacing:0.05em;}
    .footer-links{display:flex;gap:1.5rem;}
    .footer-links a{font-size:0.68rem;color:rgba(245,240,232,0.3);text-decoration:none;transition:color 0.2s;}
    .footer-links a:hover{color:var(--gold);}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">MAISON LUXE</a>
  <ul class="nav-links">
    <li><a href="shop.html">Collections</a></li>
    <li><a href="shop.html">New Arrivals</a></li>
    <li><a href="shop.html">Sale</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-icons">
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart <span class="cart-badge" id="cartCount">0</span></a>
  </div>
</nav>

<div class="page-header">
  <p class="breadcrumb"><a href="index.html">Home</a><span>›</span>Collections</p>
  <h1 class="page-title">All <em>Collections</em></h1>
</div>

<div class="shop-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-section">
      <p class="filter-title">Category</p>
      <div class="filter-options">
        <label class="filter-opt"><input type="checkbox" checked onchange="applyFilters()"><label>All Bags</label></label>
        <label class="filter-opt"><input type="checkbox" onchange="applyFilters()"><label>Shoulder Bags</label></label>
        <label class="filter-opt"><input type="checkbox" onchange="applyFilters()"><label>Clutches</label></label>
        <label class="filter-opt"><input type="checkbox" onchange="applyFilters()"><label>Tote Bags</label></label>
        <label class="filter-opt"><input type="checkbox" onchange="applyFilters()"><label>Mini Bags</label></label>
        <label class="filter-opt"><input type="checkbox" onchange="applyFilters()"><label>Crossbody</label></label>
      </div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Price Range</p>
      <input type="range" class="price-range" min="1000" max="20000" value="20000" oninput="updatePrice(this)">
      <div class="price-labels"><span>₹1,000</span><span id="priceVal">₹20,000</span></div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Color</p>
      <div class="color-swatches">
        <div class="swatch active" style="background:#C4956A" title="Tan"></div>
        <div class="swatch" style="background:#2A2A2A" title="Black"></div>
        <div class="swatch" style="background:#1B2A4A" title="Navy"></div>
        <div class="swatch" style="background:#8B2635" title="Red"></div>
        <div class="swatch" style="background:#7AB87A" title="Green"></div>
        <div class="swatch" style="background:#C9A84C" title="Gold"></div>
        <div class="swatch" style="background:#D4C5A9" title="Cream"></div>
      </div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Material</p>
      <div class="filter-options">
        <label class="filter-opt"><input type="checkbox" checked><label>Genuine Leather</label></label>
        <label class="filter-opt"><input type="checkbox"><label>Suede</label></label>
        <label class="filter-opt"><input type="checkbox"><label>Vegan Leather</label></label>
        <label class="filter-opt"><input type="checkbox"><label>Canvas</label></label>
      </div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Rating</p>
      <div class="filter-options">
        <label class="filter-opt"><input type="checkbox"><label>★★★★★ (5)</label></label>
        <label class="filter-opt"><input type="checkbox"><label>★★★★☆ (4+)</label></label>
        <label class="filter-opt"><input type="checkbox"><label>★★★☆☆ (3+)</label></label>
      </div>
    </div>
    <button class="clear-filters" onclick="clearFilters()">Clear All Filters</button>
  </aside>

  <!-- PRODUCTS -->
  <div class="products-area">
    <div class="shop-toolbar">
      <p class="result-count" id="resultCount">Showing 12 products</p>
      <div style="display:flex;gap:1rem;align-items:center;">
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('grid',this)">⊞</button>
          <button class="view-btn" onclick="setView('list',this)">☰</button>
        </div>
        <select class="sort-select" onchange="sortProducts(this.value)">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="newest">Newest</option>
          <option value="rating">Best Rating</option>
        </select>
      </div>
    </div>
    <div class="product-grid" id="productGrid"></div>
    <div class="pagination">
      <a href="#" class="page-btn">‹</a>
      <a href="#" class="page-btn active">1</a>
      <a href="#" class="page-btn">2</a>
      <a href="#" class="page-btn">3</a>
      <a href="#" class="page-btn">›</a>
    </div>
  </div>
</div>

<footer>
  <div class="footer-bottom">
    <p class="footer-copy">© 2025 Maison Luxe. All rights reserved.</p>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html">Cart</a>
    </div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
  const allProducts = [
    { id:1, name:"Riviera Tote", type:"Shoulder Bag", price:8499, img:"tan", badge:"Bestseller", rating:5 },
    { id:2, name:"Céleste Clutch", type:"Evening Bag", price:5299, original:6999, img:"gold", badge:"Sale", rating:4 },
    { id:3, name:"Monaco Mini", type:"Mini Bag", price:6799, img:"black", badge:"New", rating:5 },
    { id:4, name:"Côte d'Azur", type:"Crossbody", price:7299, img:"navy", rating:4 },
    { id:5, name:"Provence Satchel", type:"Shoulder Bag", price:9999, img:"red", badge:"New", rating:5 },
    { id:6, name:"Lumière Tote", type:"Tote Bag", price:11499, img:"cream", rating:4 },
    { id:7, name:"Bella Mini", type:"Mini Bag", price:4599, original:5999, img:"green", badge:"Sale", rating:5 },
    { id:8, name:"Noir Clutch", type:"Clutch", price:3999, img:"black", rating:4 },
    { id:9, name:"Saphir Crossbody", type:"Crossbody", price:8799, img:"navy", badge:"New", rating:5 },
    { id:10, name:"Soleil Shopper", type:"Tote Bag", price:7599, img:"tan", rating:4 },
    { id:11, name:"Rose Gold Mini", type:"Mini Bag", price:5499, img:"gold", rating:5 },
    { id:12, name:"Bordeaux Bag", type:"Shoulder Bag", price:9499, original:11999, img:"red", badge:"Sale", rating:4 },
  ];
  const bagColors = { tan:"#C4956A", gold:"#C9A84C", black:"#2A2A2A", navy:"#1B2A4A", red:"#8B2635", cream:"#D4C5A9", green:"#7AB87A" };
  let currentProducts = [...allProducts];

  function renderGrid() {
    const grid = document.getElementById('productGrid');
    document.getElementById('resultCount').textContent = `Showing ${currentProducts.length} products`;
    grid.innerHTML = currentProducts.map(p => `
      <div class="product-card">
        <div class="product-img">
          ${p.badge ? `<span class="product-badge ${p.badge==='New'?'new':''}">${p.badge}</span>` : ''}
          <div class="product-img-fill" style="background:linear-gradient(135deg,${bagColors[p.img]}22,${bagColors[p.img]}55)">
            <svg viewBox="0 0 200 250" width="120" xmlns="http://www.w3.org/2000/svg">
              <rect x="20" y="80" width="160" height="150" rx="10" fill="${bagColors[p.img]}"/>
              <path d="M65 80 C65 45 135 45 135 80" stroke="${bagColors[p.img]}88" stroke-width="12" fill="none" stroke-linecap="round"/>
              <rect x="80" y="135" width="40" height="28" rx="4" fill="#C9A84C"/>
              <line x1="30" y1="125" x2="170" y2="125" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="product-actions">
            <button class="btn-cart" onclick="addToCart(${p.id},'${p.name}',${p.price})">Add to Cart</button>
            <button class="btn-wish">♡</button>
          </div>
        </div>
        <div class="stars">${'★'.repeat(p.rating)}${'☆'.repeat(5-p.rating)}</div>
        <p class="product-type">${p.type}</p>
        <p class="product-name"><a href="product.html?id=${p.id}" style="color:inherit;text-decoration:none">${p.name}</a></p>
        <p class="product-price">₹${p.price.toLocaleString('en-IN')}${p.original?`<span class="original">₹${p.original.toLocaleString('en-IN')}</span>`:''}</p>
      </div>`).join('');
  }

  function sortProducts(val) {
    if (val==='price-asc') currentProducts.sort((a,b)=>a.price-b.price);
    else if (val==='price-desc') currentProducts.sort((a,b)=>b.price-a.price);
    else if (val==='newest') currentProducts.sort((a,b)=>b.id-a.id);
    else if (val==='rating') currentProducts.sort((a,b)=>b.rating-a.rating);
    else currentProducts=[...allProducts];
    renderGrid();
  }

  function setView(type, btn) {
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const grid = document.getElementById('productGrid');
    if (type==='list') grid.classList.add('list-view');
    else grid.classList.remove('list-view');
  }

  function updatePrice(el) {
    document.getElementById('priceVal').textContent = '₹'+parseInt(el.value).toLocaleString('en-IN');
    currentProducts = allProducts.filter(p => p.price <= parseInt(el.value));
    renderGrid();
  }

  function applyFilters() { renderGrid(); }
  function clearFilters() {
    document.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.checked=false);
    document.querySelector('input[type=checkbox]').checked=true;
    currentProducts=[...allProducts];
    renderGrid();
  }

  function addToCart(id,name,price) {
    let cart=JSON.parse(localStorage.getItem('mlCart')||'[]');
    const ex=cart.find(i=>i.id===id);
    if(ex) ex.qty++; else cart.push({id,name,price,qty:1});
    localStorage.setItem('mlCart',JSON.stringify(cart));
    updateCartCount();
    showToast(`"${name}" added to cart`);
  }

  function updateCartCount() {
    const cart=JSON.parse(localStorage.getItem('mlCart')||'[]');
    const total=cart.reduce((s,i)=>s+i.qty,0);
    document.querySelectorAll('#cartCount').forEach(el=>el.textContent=total);
  }

  function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }

  document.querySelectorAll('.swatch').forEach(s=>{
    s.addEventListener('click',function(){
      document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
      this.classList.add('active');
    });
  });

  renderGrid();
  updateCartCount();
</script>
</body>
</html>
