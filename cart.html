  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — MAISON LUXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#F5F0E8;--dark:#1A1410;--gold:#C9A84C;--gold-light:#E8D5A3;--warm-gray:#8A7F74;--accent:#8B2635;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--cream);color:var(--dark);font-family:'Montserrat',sans-serif;}
    nav{position:fixed;top:0;width:100%;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.2rem 4rem;background:rgba(245,240,232,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,168,76,0.2);}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;letter-spacing:0.3em;color:var(--dark);text-decoration:none;}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dark);text-decoration:none;transition:color 0.2s;}
    .nav-links a:hover{color:var(--gold);}
    .nav-icons{display:flex;gap:1.5rem;align-items:center;}
    .nav-icons a{color:var(--dark);text-decoration:none;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
    .nav-icons a:hover{color:var(--gold);}
    .cart-badge{background:var(--accent);color:white;border-radius:50%;width:18px;height:18px;font-size:0.6rem;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;}

    .cart-page{display:grid;grid-template-columns:1fr 380px;gap:3rem;padding:8rem 4rem 4rem;max-width:1400px;margin:0 auto;}
    .cart-left h1{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;margin-bottom:0.5rem;}
    .cart-left h1 em{font-style:italic;color:var(--gold);}
    .item-count{font-size:0.72rem;letter-spacing:0.1em;color:var(--warm-gray);margin-bottom:2.5rem;}

    /* CART ITEMS */
    .cart-items{display:flex;flex-direction:column;gap:0;}
    .cart-item{display:grid;grid-template-columns:110px 1fr auto;gap:1.5rem;padding:2rem 0;border-bottom:1px solid rgba(26,20,16,0.1);align-items:start;}
    .item-img{width:110px;height:135px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .item-details{flex:1;}
    .item-brand{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:0.3rem;}
    .item-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;margin-bottom:0.5rem;}
    .item-meta{font-size:0.7rem;color:var(--warm-gray);margin-bottom:1rem;}
    .item-meta span{margin-right:1rem;}
    .qty-control{display:flex;align-items:center;border:1px solid rgba(26,20,16,0.2);width:fit-content;}
    .q-btn{width:36px;height:36px;background:transparent;border:none;font-size:1rem;cursor:pointer;color:var(--dark);transition:background 0.2s;}
    .q-btn:hover{background:rgba(26,20,16,0.05);}
    .q-val{width:45px;height:36px;text-align:center;border-left:1px solid rgba(26,20,16,0.2);border-right:1px solid rgba(26,20,16,0.2);font-size:0.85rem;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;}
    .item-price-col{text-align:right;}
    .item-price{font-size:1rem;font-weight:600;margin-bottom:0.75rem;}
    .remove-btn{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--warm-gray);border:none;background:none;cursor:pointer;text-decoration:underline;font-family:'Montserrat',sans-serif;transition:color 0.2s;}
    .remove-btn:hover{color:var(--accent);}

    .empty-cart{text-align:center;padding:5rem 0;}
    .empty-cart p{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--warm-gray);margin-bottom:1.5rem;}
    .btn-continue{display:inline-block;padding:1rem 2.5rem;background:var(--dark);color:var(--cream);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;text-decoration:none;font-weight:600;transition:background 0.2s;}
    .btn-continue:hover{background:var(--gold);color:var(--dark);}

    /* ORDER SUMMARY */
    .order-summary{background:var(--dark);color:var(--cream);padding:2.5rem;height:fit-content;position:sticky;top:100px;}
    .summary-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(245,240,232,0.1);}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:1rem;font-size:0.78rem;}
    .summary-row.total{font-weight:600;font-size:1rem;padding-top:1.2rem;margin-top:0.5rem;border-top:1px solid rgba(245,240,232,0.1);}
    .summary-label{color:rgba(245,240,232,0.6);}
    .coupon-row{display:flex;gap:0;margin:1.5rem 0;}
    .coupon-input{flex:1;padding:0.85rem 1rem;background:rgba(245,240,232,0.08);border:1px solid rgba(245,240,232,0.15);color:var(--cream);font-family:'Montserrat',sans-serif;font-size:0.75rem;outline:none;}
    .coupon-input::placeholder{color:rgba(245,240,232,0.35);}
    .coupon-input:focus{border-color:var(--gold);}
    .coupon-btn{padding:0.85rem 1.2rem;background:var(--gold);color:var(--dark);border:none;font-family:'Montserrat',sans-serif;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-weight:600;}
    .coupon-btn:hover{background:var(--gold-light);}
    .checkout-btn{width:100%;padding:1.2rem;background:var(--gold);color:var(--dark);border:none;font-family:'Montserrat',sans-serif;font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-weight:600;margin-top:1.5rem;transition:background 0.2s;}
    .checkout-btn:hover{background:var(--gold-light);}
    .security-note{text-align:center;font-size:0.65rem;color:rgba(245,240,232,0.35);margin-top:1rem;letter-spacing:0.05em;}
    .payment-icons{display:flex;justify-content:center;gap:0.5rem;margin-top:1rem;}
    .p-icon{padding:0.3rem 0.6rem;background:rgba(245,240,232,0.1);font-size:0.6rem;letter-spacing:0.05em;color:rgba(245,240,232,0.5);}

    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--dark);color:var(--cream);padding:1rem 1.5rem;font-size:0.75rem;z-index:999;transform:translateX(200%);transition:transform 0.3s;border-left:3px solid var(--gold);}
    .toast.show{transform:translateX(0);}
  </style>
</head>
<body>

<div class="cart-page">
  <div class="cart-left">
    <h1>Your <em>Cart</em></h1>
    <p class="item-count" id="itemCount"></p>
    <div class="cart-items" id="cartItems"></div>
  </div>

  <div class="order-summary">
    <h3 class="summary-title">Order Summary</h3>
    <div class="summary-row"><span class="summary-label">Subtotal</span><span id="subtotal">₹0</span></div>
    <div class="summary-row"><span class="summary-label">Shipping</span><span id="shipping">Free</span></div>
    <div class="summary-row"><span class="summary-label">Tax (GST 18%)</span><span id="tax">₹0</span></div>
    <div class="coupon-row">
      <input type="text" class="coupon-input" id="couponInput" placeholder="Coupon code">
      <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
    </div>
    <div class="summary-row" id="discountRow" style="display:none;color:#7AB87A"><span class="summary-label">Discount</span><span id="discountAmt"></span></div>
    <div class="summary-row total"><span>Total</span><span id="totalAmt">₹0</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
    <p class="security-note">🔒 Secured by 256-bit SSL encryption</p>
    <div class="payment-icons">
      <span class="p-icon">Visa</span>
      <span class="p-icon">Mastercard</span>
      <span class="p-icon">UPI</span>
      <span class="p-icon">NetBanking</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const bagColors={1:"#C4956A",2:"#C9A84C",3:"#2A2A2A",4:"#1B2A4A",5:"#8B2635",6:"#D4C5A9",7:"#7AB87A",8:"#2A2A2A",9:"#1B2A4A",10:"#C4956A",11:"#C9A84C",12:"#8B2635"};
  const productNames={1:"Riviera Tote",2:"Céleste Clutch",3:"Monaco Mini",4:"Côte d'Azur",5:"Provence Satchel",6:"Lumière Tote",7:"Bella Mini",8:"Noir Clutch",9:"Saphir Crossbody",10:"Soleil Shopper",11:"Rose Gold Mini",12:"Bordeaux Bag"};

  function getCart(){return JSON.parse(localStorage.getItem('mlCart')||'[]');}
  function saveCart(c){localStorage.setItem('mlCart',JSON.stringify(c));}

  function renderCart() {
    const cart=getCart();
    const container=document.getElementById('cartItems');
    const total=cart.reduce((s,i)=>s+i.qty,0);
    document.getElementById('itemCount').textContent=`${total} item${total!==1?'s':''} in your cart`;
    document.querySelectorAll('#cartCount').forEach(el=>el.textContent=total);

    if(cart.length===0){
      container.innerHTML=`<div class="empty-cart"><p>Your cart is empty</p><a href="shop.html" class="btn-continue">Continue Shopping</a></div>`;
      updateSummary(0); return;
    }

    container.innerHTML=cart.map(item=>{
      const c=bagColors[item.id]||'#C4956A';
      return `
        <div class="cart-item" data-id="${item.id}">
          <div class="item-img" style="background:linear-gradient(135deg,${c}22,${c}44)">
            <svg viewBox="0 0 120 150" width="80" xmlns="http://www.w3.org/2000/svg">
              <rect x="10" y="50" width="100" height="95" rx="7" fill="${c}"/>
              <path d="M38 50 C38 25 82 25 82 50" stroke="${c}88" stroke-width="9" fill="none" stroke-linecap="round"/>
              <rect x="48" y="88" width="24" height="17" rx="3" fill="#C9A84C"/>
            </svg>
          </div>
          <div class="item-details">
            <p class="item-brand">Maison Luxe</p>
            <p class="item-name">${item.name}</p>
            <p class="item-meta"><span>Color: Cognac</span><span>Size: Medium</span></p>
            <div class="qty-control">
              <button class="q-btn" onclick="updateQty(${item.id},-1)">−</button>
              <div class="q-val">${item.qty}</div>
              <button class="q-btn" onclick="updateQty(${item.id},1)">+</button>
            </div>
          </div>
          <div class="item-price-col">
            <p class="item-price">₹${(item.price*item.qty).toLocaleString('en-IN')}</p>
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>`;
    }).join('');

    const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
    updateSummary(subtotal);
  }

  function updateSummary(subtotal) {
    const shipping=subtotal>=5000?0:299;
    const tax=Math.round(subtotal*0.18);
    const disc=window.discountAmt||0;
    const total=subtotal+shipping+tax-disc;
    document.getElementById('subtotal').textContent='₹'+subtotal.toLocaleString('en-IN');
    document.getElementById('shipping').textContent=shipping===0?'Free':'₹'+shipping;
    document.getElementById('tax').textContent='₹'+tax.toLocaleString('en-IN');
    document.getElementById('totalAmt').textContent='₹'+Math.max(0,total).toLocaleString('en-IN');
  }

  function updateQty(id,delta) {
    let cart=getCart();
    const item=cart.find(i=>i.id===id);
    if(item){item.qty=Math.max(1,item.qty+delta);}
    saveCart(cart); renderCart();
  }

  function removeItem(id) {
    let cart=getCart().filter(i=>i.id!==id);
    saveCart(cart); renderCart();
    showToast('Item removed from cart');
  }

  function applyCoupon() {
    const code=document.getElementById('couponInput').value.trim().toUpperCase();
    const cart=getCart();
    const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
    if(code==='LUXE20'){
      window.discountAmt=Math.round(subtotal*0.2);
      document.getElementById('discountRow').style.display='flex';
      document.getElementById('discountAmt').textContent='-₹'+window.discountAmt.toLocaleString('en-IN');
      updateSummary(subtotal);
      showToast('Coupon applied! 20% off');
    } else if(code==='SAVE500'){
      window.discountAmt=500;
      document.getElementById('discountRow').style.display='flex';
      document.getElementById('discountAmt').textContent='-₹500';
      updateSummary(subtotal);
      showToast('₹500 discount applied!');
    } else {
      showToast('Invalid coupon code');
    }
  }

  function checkout() {
    const cart=getCart();
    if(cart.length===0){showToast('Your cart is empty');return;}
    showToast('Proceeding to checkout...');
    setTimeout(()=>{ alert('Checkout coming soon! This is a demo store.'); },1000);
  }

  function showToast(msg) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }

  window.discountAmt=0;
  renderCart();
</script>
</body>
</html>
